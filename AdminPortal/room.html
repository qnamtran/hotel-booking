<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal - Room Management</title>
</head>
<body>
<h1>Room Management</h1>

<!-- link back to admin portal homepage -->
<p><a href="adminPortal">Back to Admin Portal Homepage</a></p>

<!-- form to create a new room -->
<form id="createRoomForm">
    <label for="roomType">Room Type:</label>
    <select id="roomType" required>
        <option value="DoubleQueen">Double Queen</option>
        <option value="SingleKing">Single King</option>
    </select><br>
    <label for="roomNumber">Room Number:</label>
    <input type="number" id="roomNumber" required><br>
    <label for="floorNumber">Floor Number:</label>
    <input type="number" id="floorNumber" required><br>
    <label for="isClean">Is Clean:</label>
    <input type="checkbox" id="isClean"><br>
    <label for="isRollinAccessible">Roll-in Accessible:</label>
    <input type="checkbox" id="isRollinAccessible"><br>
    <label for="isHearingAccessible">Hearing Accessible:</label>
    <input type="checkbox" id="isHearingAccessible"><br>
    <button type="submit">Create Room</button>
</form>

<!-- container to display rooms -->
<div id="roomList">
    <!-- room list will be displayed here -->
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // function to fetch and display all rooms
    function displayRooms() {
        fetch('/routes/rooms')
            .then(response => response.json())
            .then(data => {
                const roomListContainer = document.getElementById('roomList');
                roomListContainer.innerHTML = ''; // clear previous rooms
                data.forEach(room => {
                    const roomDiv = document.createElement('div');
                    roomDiv.innerHTML = `
                        <p>Room Type: ${room.roomType}</p>
                        <p>Room Number: ${room.roomNumber}</p>
                        <p>Floor Number: ${room.floorNumber}</p>
                        <p>Is Clean: ${room.isClean ? 'Yes' : 'No'}</p>
                        <p>Roll-in Accessible: ${room.isRollinAccessible ? 'Yes' : 'No'}</p>
                        <p>Hearing Accessible: ${room.isHearingAccessible ? 'Yes' : 'No'}</p>
                        <button class="deleteBtn" data-id="${room._id}">Delete</button>
                        <button class="editBtn" data-id="${room._id}">Edit</button>
                    `;
                    roomListContainer.appendChild(roomDiv);
                });

                // attach event listeners to delete buttons
                const deleteButtons = document.querySelectorAll('.deleteBtn');
                deleteButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const roomId = this.getAttribute('data-id');
                        deleteRoom(roomId);
                    });
                });

                // attach event listeners to edit buttons
                const editButtons = document.querySelectorAll('.editBtn');
                editButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const roomId = this.getAttribute('data-id');
                        // implement edit functionality here
                        alert(`Editing room with ID: ${roomId}`);
                    });
                });
            });
    }

    // function to delete a room
    function deleteRoom(roomId) {
        fetch(`/routes/rooms/${roomId}`, {
            method: 'DELETE'
        })
        .then(() => {
            displayRooms(); // refresh room list after deletion
        });
    }

    // display list of rooms
    displayRooms();

    // event listener for create room form submission
    document.getElementById('createRoomForm').addEventListener('submit', function(event) {
    event.preventDefault(); // prevent default form submission

    const roomType = document.getElementById('roomType').value;
    const roomNumber = document.getElementById('roomNumber').value;
    const floorNumber = document.getElementById('floorNumber').value;
    const isClean = document.getElementById('isClean').checked;
    const isRollinAccessible = document.getElementById('isRollinAccessible').checked;
    const isHearingAccessible = document.getElementById('isHearingAccessible').checked;

    // ensure roomNumber and floorNumber are parsed as integers
    const parsedRoomNumber = parseInt(roomNumber);
    const parsedFloorNumber = parseInt(floorNumber);

    // create a new room
    fetch('/routes/rooms', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            roomType: roomType,
            roomNumber: parsedRoomNumber,
            floorNumber: parsedFloorNumber,
            isClean: isClean,
            isRollinAccessible: isRollinAccessible,
            isHearingAccessible: isHearingAccessible
        })
    })
    .then(response => response.json())
    .then(() => {
        displayRooms(); // refresh room list after creation
        clearInputFields(); // clear input fields after creation
    });
});


    // function to clear input fields
    function clearInputFields() {
        document.getElementById('roomType').value = 'DoubleQueen';
        document.getElementById('roomNumber').value = '';
        document.getElementById('floorNumber').value = '';
        document.getElementById('isClean').checked = false;
        document.getElementById('isRollinAccessible').checked = false;
        document.getElementById('isHearingAccessible').checked = false;
    }
});
</script>
</body>
</html>
