<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Management</title>
</head>
<body>
    <h1>Room Management</h1>

    <!-- link back to admin portal homepage -->
    <p><a href="/">Back to Admin Portal Homepage</a></p>

    <!-- form for creating a new room -->
    <h2>Create Room</h2>
    <form id="createRoomForm">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br>
        <label for="description">Description:</label><br>
        <textarea id="description" name="description" required></textarea><br>
        <label for="maxPeople">Max People:</label><br>
        <input type="number" id="maxPeople" name="maxPeople" required><br>
        <label for="numberOfBed">Number of Beds:</label><br>
        <input type="number" id="numberOfBed" name="numberOfBed" required><br>
        <label for="costPerNight">Cost Per Night:</label><br>
        <input type="number" id="costPerNight" name="costPerNight" required><br>
        <label for="photo">Photo:</label><br>
        <input type="text" id="photo" name="photo"><br>
        <button type="submit">Create Room</button>
    </form>

    <!-- container to display rooms -->
    <h2>Rooms</h2>
    <div id="roomList"></div>

    <script>
        // function to fetch rooms from the backend
        async function fetchRooms() {
            const response = await fetch('/routes/rooms');
            const rooms = await response.json();
            const roomList = document.getElementById('roomList');
            roomList.innerHTML = ''; // clear existing content
            rooms.forEach(room => {
                displayRoom(room);
            });
        }
    
        // function to create a new room
        async function createRoom(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const body = {};
            formData.forEach((value, key) => {
                body[key] = value;
            });
    
            const response = await fetch('/routes/rooms', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });
    
            if (response.ok) {
                fetchRooms(); // refresh room list
                form.reset();
            } else {
                alert('Failed to create room');
            }
        }
    
        // function to delete a room
        async function deleteRoom(id) {
            const response = await fetch(`/routes/rooms/find/${id}`, {
                method: 'DELETE'
            });
    
            if (response.ok) {
                fetchRooms(); // refresh room list
            } else {
                alert('Failed to delete room');
            }
        }
    
        // function to edit a room
        async function editRoom(id, updatedData) {
            const response = await fetch(`/routes/rooms/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updatedData)
            });
    
            if (response.ok) {
                fetchRooms(); // refresh room list
            } else {
                alert('Failed to update room');
            }
        }
    
        // function to handle room edit form submission
        async function handleEditFormSubmit(event, roomId) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const updatedData = {};
            formData.forEach((value, key) => {
                updatedData[key] = value;
            });
            editRoom(roomId, updatedData);
            closeEditForm(roomId); // close the edit form after submission
        }
    
        // function to display room edit form
        function displayEditForm(roomId) {
            const roomItem = document.getElementById(`roomItem-${roomId}`);
            const editForm = document.createElement('form');
            editForm.classList.add('editForm');
            editForm.innerHTML = `
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br>
                <label for="description">Description:</label><br>
                <textarea id="description" name="description" required></textarea><br>
                <label for="maxPeople">Max People:</label><br>
                <input type="number" id="maxPeople" name="maxPeople" required><br>
                <label for="numberOfBed">Number of Beds:</label><br>
                <input type="number" id="numberOfBed" name="numberOfBed" required><br>
                <label for="costPerNight">Cost Per Night:</label><br>
                <input type="number" id="costPerNight" name="costPerNight" required><br>
                <label for="photo">Photo:</label><br>
                <input type="text" id="photo" name="photo"><br>
                <button type="submit">Update</button>
                <button type="button" onclick="closeEditForm('${roomId}')">Cancel</button>
         `;
        roomItem.appendChild(editForm);
        }

        // function to close edit form
        function closeEditForm(roomId) {
            const roomItem = document.getElementById(`roomItem-${roomId}`);
            console.log(roomItem);
            const editForm = roomItem.querySelector('.editForm');
            console.log(editForm);
            if (editForm) {
                editForm.remove();
            }
        }
    
        // function to display room details
        function displayRoom(room) {
            const roomList = document.getElementById('roomList');
            const roomItem = document.createElement('div');
            roomItem.id = `roomItem-${room._id}`;
            roomItem.innerHTML = `
                <p>Name: ${room.name}</p>
                <p>Description: ${room.description}</p>
                <p>Max People: ${room.maxPeople}</p>
                <p>Number of Beds: ${room.numberOfBed}</p>
                <p>Cost Per Night: ${room.costPerNight}</p>
                <p>Photo: ${room.photo}</p>
            `;
            const editButton = document.createElement('button');
            editButton.textContent = 'Edit';
            editButton.addEventListener('click', () => {
                const existingEditForm = roomItem.querySelector('.editForm');
                if (!existingEditForm) {
                    displayEditForm(room._id);
                }
            });
            const deleteButton = document.createElement('button');
            deleteButton.textContent = 'Delete';
            deleteButton.addEventListener('click', () => {
                deleteRoom(room._id);
            });
            roomItem.appendChild(editButton);
            roomItem.appendChild(deleteButton);
            roomList.appendChild(roomItem);
        }
    
        // attach event listener to form submit
        const createRoomForm = document.getElementById('createRoomForm');
        createRoomForm.addEventListener('submit', createRoom);
    
        // fetch rooms when the page loads
        fetchRooms();
    </script>
    
    
</body>
</html>
