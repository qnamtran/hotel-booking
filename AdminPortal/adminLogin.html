<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
</head>

<body>
  <div>
    <h2>Admin Login</h2>
    <form id="loginForm">
      <input type="text" id="email" name="email" placeholder="Email" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p id="errorMessage"></p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      fetch('/routes/employees/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      })
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          console.log(data); // Response here
          let response = JSON.parse(data)
          if (response.isAdmin) {
            window.location.href = '/adminPortal'; // Redirect to admin portal upon successful login
          } else {
            alert("you no admin")
          }
        })
        .catch(error => {
          console.error('Error:', error);
          document.getElementById('errorMessage').textContent = 'Invalid email or password';
        });
    });
  </script>
</body>

</html>
